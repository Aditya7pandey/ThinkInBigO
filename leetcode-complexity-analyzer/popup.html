<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            background: #1e1e1e;
            color: #eff1f6;
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #3e3e3e;
            padding-bottom: 16px;
        }
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }
        .title-group h1 {
            margin: 0;
            font-size: 20px;
            color: #ffa116;
            letter-spacing: -0.5px;
        }
        .title-group p {
            margin: 0;
            font-size: 11px;
            color: #9e9e9e;
        }
        h2 { color: #ffa116; margin-top: 0; font-size: 18px; }
        .setting-item {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #9e9e9e;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #3e3e3e;
            padding: 8px;
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
        }
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3e3e3e;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #ffa116; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .btn-save {
            background: #ffa116;
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-save:hover { background: #ffb84d; }
        
        .history-link {
            display: block;
            text-align: center;
            color: #9e9e9e;
            font-size: 12px;
            margin-top: 15px;
            text-decoration: none;
        }
        .history-link:hover { color: #ffa116; }

        .status-msg {
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            height: 15px;
        }
        .success { color: #2db55d; }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="ThinkInBigO Logo" class="logo">
        <div class="title-group">
            <h1>ThinkInBigO</h1>
            <p>AI Complexity Analyzer</p>
        </div>
    </div>
    
    <div class="setting-item">
        <div class="toggle-group">
            <span style="font-size: 14px;">Extension Enabled</span>
            <label class="switch">
                <input type="checkbox" id="extension-enabled">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="setting-item">
        <div class="toggle-group">
            <span style="font-size: 14px;">LLM Evaluation</span>
            <label class="switch">
                <input type="checkbox" id="llm-enabled">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="setting-item">
        <label for="api-key">Gemini API Key</label>
        <input type="password" id="api-key" placeholder="Enter Gemini API Key">
    </div>

    <button id="save-settings" class="btn-save">Save Settings</button>
    <div id="status" class="status-msg"></div>

    <a href="#" id="view-history" class="history-link">View History (Coming Soon)</a>

    <script src="popup.js"></script>
</body>
</html>
